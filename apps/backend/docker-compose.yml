services:
  postgres:
    image: postgres:16
    container_name: timebox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-timebox}
      POSTGRES_USER: ${DB_USER:-timebox}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-timebox}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - timebox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-timebox} -d ${DB_NAME:-timebox}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  timebox-postgres-data:
